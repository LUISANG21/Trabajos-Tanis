name: Deploy RockPhys Flutter Web to GitHub Pages

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    name: Build and Deploy RockPhys
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Instalar Flutter estable
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Habilitar Flutter Web
        run: flutter config --enable-web

      - name: Instalar dependencias
        run: flutter pub get

      - name: Compilar Flutter Web
        run: flutter build web --release --base-href "/Trabajos-Tanis/"

      - name: Publicar en GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build/web
          publish_branch: gh-pages
          force_orphan: true
